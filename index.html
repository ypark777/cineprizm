<!DOCTYPE html>
<html lang="ko">
<head>

    :root {

      --bg-secondary: #f6f4f1;

      --bg-danger:    #fff5f5;
      --bg-success:   #f0fdf4;

      --border-secondary: #dedad5;
      --border-tertiary:  #e8e5e0;
      --border-danger:    #fecaca;
      --border-success:   #bbf7d0;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;

    ::-webkit-scrollbar-thumb { background: var(--border-primary); border-radius: 3px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      .grid-2 { grid-template-columns: 1fr !important; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ═══════════════════════════════════════════════════
       CONSTANTS
    ═══════════════════════════════════════════════════ */
    const STATUS_CFG = {
      "pre-production": { label:"Pre-Production", c:"#7c3aed", bg:"rgba(124,58,237,0.08)", border:"rgba(124,58,237,0.22)" },
      "in-production":  { label:"In Production",  c:"#2563eb", bg:"rgba(37,99,235,0.08)",   border:"rgba(37,99,235,0.22)" },

    const SENT_CFG = {

    const TABS = [
      { id:"overview",  label:"영화 개요" },
      { id:"buzz",      label:"언론·커뮤니티" },

      "Variety · The Hollywood Reporter 기사 검색 중…",

      "BoxOfficeMojo 북미 개봉 일정 조회 중…",

    ];

    const recColor = r => {
      if (!r) return "#6b7280";
      if (r.includes("추천")) return "#059669";
      if (r.includes("검토") || r.includes("조건")) return "#d97706";
      return "#c9292b";
    };
    const scoreColor = n => {
      if (!n) return "var(--text-tertiary)";
      if (n >= 8) return "#e8a500";
      if (n >= 6) return "#059669";
      if (n >= 4) return "#d97706";
      return "#c9292b";
    };

    /* ═══════════════════════════════════════════════════
       SYSTEM PROMPT
    ═══════════════════════════════════════════════════ */
    const SYSTEM_PROMPT = `당신은 한국 외국 영화 수입배급사의 시니어 영화 분석가입니다. 웹 검색을 최대한 활용하여 입력된 영화의 한국 배급 가능성을 종합 분석합니다.

【제작 상태별 검색 지침】
- pre-production: 개발 공지 기사, 감독/배우 캐스팅 확정 뉴스 중심
- in-production: 촬영 현장 기사, 첫 스틸 및 예고편, 시장 반응 예측 중심
- completed: 영화제 상영 리뷰, 시사회 반응, 배급 계약/판매 뉴스 중심
- released: 최종 박스오피스 성적, 비평·관객 반응, 한국 개봉 이력 중심

【필수 검색 소스 — 모두 검색할 것】
1. IMDb, Rotten Tomatoes — 기본 정보 및 평점
2. Variety (variety.com) — 기사, 리뷰, 박스오피스
3. The Hollywood Reporter (hollywoodreporter.com) — 기사 및 비평
4. Screen International, Deadline Hollywood — 영화제/마켓 뉴스
5. Reddit: r/movies, r/criterion, r/filmfestivals, 장르 서브레딧
6. 익스트림무비(extrememovie.com) — 국내 영화 커뮤니티 반응
7. 무비코리아, 네이버 영화, 왓챠피디아 — 국내 기대감 및 커뮤니티 DB
8. KOBIS(kobis.or.kr) — 한국 개봉 영화 누적관객수
9. BoxOfficeMojo(boxofficemojo.com/calendar/) — 북미 개봉 예정 일정

【KOBIS 한국 흥행 조회 절차 — 반드시 준수】
감독·배우 필모그래피의 한국 흥행 수치 및 유사작 비교 수치는 반드시 아래 절차로 조회한다:
① 영화 영문 원제로 KOBIS(kobis.or.kr) 검색 → 한국 개봉명 확인 → 누적관객수(발권통계) 기록
② KOBIS에서 결과가 없으면: 네이버에서 "영화 [영문원제]" 형식으로 검색 → 관객수 확인
③ 두 방법 모두 실패 시: koreanAudience 필드에 "미개봉" 또는 "정보없음" 기재
④ 반드시 한국개봉명(koreanTitle)과 누적관객수(koreanAudience, 단위: 명)를 함께 기재
⑤ 예시: title="Knives Out", koreanTitle="나이브스 아웃", koreanAudience="1,247,832명"

【BoxOfficeMojo 북미 개봉 일정 조회 절차】
theatricalStrategy.releaseTimingSuggestion 작성 시 반드시:
① boxofficemojo.com/calendar/ 에서 해당 영화의 북미 개봉일 확인
② 분석 대상 영화의 북미 개봉 시기 전후 2~3개월 북미 주요 개봉작 조회
③ 한국 메이저 직배사(CJ ENM, 월트디즈니, 유니버설, 워너브라더스, 소니 등)는 북미와 동일 개봉일(Day & Date) 또는 1~2주 이내 한국 개봉이 관행임
④ 위 직배사 라인업과 겹치지 않는 최적 한국 개봉 시기를 추천하고, 경쟁 회피 근거를 구체적으로 서술
⑤ 만약 사용자가 배급사 라인업 데이터를 업로드한 경우, 해당 데이터를 우선 반영하여 배급 시기 추천

【tradePressAndBuzz URL 규칙】
url 필드는 반드시 웹 검색으로 실제 확인된 URL만 기재. 찾지 못한 경우 빈 문자열(""). URL 절대 추측·생성 금지.

아래 JSON 형식으로만 응답하세요. JSON 외 다른 텍스트나 마크다운 코드블록은 절대 포함 금지:

{"filmOverview":{"title":"","koreanTitle":"","year":"","country":"","genre":"","runtime":"","status":"","releaseDate":"","imdbRating":"","rtScore":"","synopsis":"","awards":"","festivalHistory":""},"tradePressAndBuzz":{"tradeArticles":[{"source":"","title":"","url":"","date":"","summary":""}],"communityBuzz":[{"platform":"","title":"","url":"","sentiment":"","note":""}],"festivalReviews":[{"source":"","title":"","url":"","sentiment":""}],"overallSentiment":"","buzzSummary":""},"directorAnalysis":{"name":"","nationality":"","careerSummary":"","majorWorks":[{"title":"원제","koreanTitle":"한국개봉명(없으면 미개봉)","year":"","globalBO":"글로벌 흥행","koreanAudience":"누적관객수(명) 또는 미개봉"}],"koreanMarketSummary":"","acquisitionValue":""},"castAnalysis":[{"name":"","role":"","nationality":"","koreanRecognition":"","majorWorks":[{"title":"원제","koreanTitle":"한국개봉명(없으면 미개봉)","year":"","koreanAudience":"누적관객수(명) 또는 미개봉","note":"흥행·수상 메모"}],"marketingValue":""}],"marketAnalysis":{"opportunities":[{"factor":"","description":""}],"threats":[{"factor":"","description":""}],"comparableFilms":[{"title":"원제","koreanTitle":"한국개봉명","koreanAudience":"누적관객수(명)","relevance":"비교근거"}],"optimalReleaseWindow":""},"marketingPlan":{"primaryTarget":"","secondaryTarget":"","keywords":[],"taglines":[],"platformStrategy":"","keySellingPoints":[],"theatricalStrategy":{"releaseType":"와이드 개봉(300관 이상) 또는 중소규모(100-300관) 또는 한정/아트하우스(100관 미만)","recommendedScreenCount":"","targetTheatreChains":"","releaseTimingSuggestion":"BoxOfficeMojo 북미 개봉 일정 및 직배사 경쟁작을 고려한 추천 한국 개봉 시기","competitionAnalysis":"북미 동시 개봉 직배사 경쟁작 및 한국 시장 경쟁 분석","platformWindowStrategy":""}},"pressReleaseDraft":"","overallAssessment":{"acquisitionScore":7,"recommendation":"","expectedAudienceRange":"","keyRisks":"","finalOpinion":""}}

위 JSON 스키마를 실제 분석 결과로 채워서 반환하세요.`;

    /* ═══════════════════════════════════════════════════
       EXPORT HELPERS
    ═══════════════════════════════════════════════════ */
    function downloadCSV(R, title) {
      const ov = R?.filmOverview, oa = R?.overallAssessment,
            mp = R?.marketingPlan, ts = mp?.theatricalStrategy,
            bz = R?.tradePressAndBuzz;
      const rows = [
        ["항목","내용"],
        ["영화 제목 (영문)", ov?.title||""],
        ["영화 제목 (한국어)", ov?.koreanTitle||""],
        ["제작 상태", ov?.status||""],
        ["제작연도", ov?.year||""],
        ["제작국가", ov?.country||""],
        ["장르", ov?.genre||""],
        ["상영시간", ov?.runtime||""],
        ["개봉일/예정", ov?.releaseDate||""],
        ["IMDb 평점", ov?.imdbRating||""],
        ["RT 점수", ov?.rtScore||""],
        ["영화제 이력", ov?.festivalHistory||""],
        ["시놉시스", ov?.synopsis||""],
        ["",""],
        ["구매 점수 (10점 만점)", oa?.acquisitionScore||""],
        ["구매 추천 여부", oa?.recommendation||""],
        ["예상 관객 수", oa?.expectedAudienceRange||""],
        ["핵심 리스크", oa?.keyRisks||""],
        ["종합 의견", oa?.finalOpinion||""],
        ["",""],
        ["감독명", R?.directorAnalysis?.name||""],
        ["감독 국적", R?.directorAnalysis?.nationality||""],
        ["감독 경력 요약", R?.directorAnalysis?.careerSummary||""],
        ["한국 시장 실적", R?.directorAnalysis?.koreanMarketSummary||""],
        ["",""],
        ["핵심 타겟", mp?.primaryTarget||""],
        ["부차 타겟", mp?.secondaryTarget||""],
        ["키워드", (mp?.keywords||[]).join(", ")],
        ["카피라인", (mp?.taglines||[]).join(" / ")],
        ["",""],
        ["극장 배급 유형", ts?.releaseType||""],
        ["추천 개봉 시기", ts?.releaseTimingSuggestion||""],
        ["추천 상영관 수", ts?.recommendedScreenCount||""],
        ["극장 체인 전략", ts?.targetTheatreChains||""],
        ["경쟁작 분석", ts?.competitionAnalysis||""],
        ["OTT 전환 전략", ts?.platformWindowStrategy||""],
        ["",""],
        ["전반적 버즈 반응", bz?.overallSentiment||""],
        ["버즈 요약", bz?.buzzSummary||""],
        ["",""],
        ["보도자료 초안", R?.pressReleaseDraft||""],
      ];
      const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\r\n");
      const blob = new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
      a.download=`PRIZM_${(title||"film").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
    }

    function downloadTXT(R, title) {
      const ts=R?.marketingPlan?.theatricalStrategy, hr="─".repeat(56);
      const lines=[
        "PRIZM — Film Acquisition Intelligence",hr,
        `분석 리포트: ${R?.filmOverview?.title||title}`,
        `생성일: ${new Date().toLocaleDateString("ko-KR")}`,
        hr,"",
        "■ 영화 기본 정보",
        `  제목 (영문): ${R?.filmOverview?.title}`,
        `  제목 (한국어): ${R?.filmOverview?.koreanTitle}`,
        `  제작 상태: ${R?.filmOverview?.status}`,
        `  제작연도 / 국가: ${R?.filmOverview?.year} / ${R?.filmOverview?.country}`,
        `  장르 / 상영시간: ${R?.filmOverview?.genre} / ${R?.filmOverview?.runtime}`,
        `  개봉일/예정: ${R?.filmOverview?.releaseDate}`,
        `  IMDb: ${R?.filmOverview?.imdbRating}  |  RT: ${R?.filmOverview?.rtScore}`,
        `  영화제: ${R?.filmOverview?.festivalHistory}`,
        `  시놉시스: ${R?.filmOverview?.synopsis}`,
        "","■ 종합 평가",
        `  점수: ${R?.overallAssessment?.acquisitionScore}/10`,
        `  추천: ${R?.overallAssessment?.recommendation}`,
        `  예상 관객: ${R?.overallAssessment?.expectedAudienceRange}`,
        `  리스크: ${R?.overallAssessment?.keyRisks}`,
        `  의견: ${R?.overallAssessment?.finalOpinion}`,
        "","■ 감독 분석",
        `  감독: ${R?.directorAnalysis?.name} (${R?.directorAnalysis?.nationality})`,
        `  ${R?.directorAnalysis?.careerSummary}`,
        `  한국 시장: ${R?.directorAnalysis?.koreanMarketSummary}`,
        "","■ 마케팅 플랜",
        `  타겟: ${R?.marketingPlan?.primaryTarget}`,
        `  키워드: ${(R?.marketingPlan?.keywords||[]).join(", ")}`,
        "  카피라인:",
        ...(R?.marketingPlan?.taglines||[]).map(t=>`    · "${t}"`),
        "","■ 극장 배급 전략",
        `  유형: ${ts?.releaseType}`,
        `  개봉 시기: ${ts?.releaseTimingSuggestion}`,
        `  상영관 수: ${ts?.recommendedScreenCount}`,
        `  체인 전략: ${ts?.targetTheatreChains}`,
        `  경쟁작: ${ts?.competitionAnalysis}`,
        `  OTT 전환: ${ts?.platformWindowStrategy}`,
        "",hr,"■ 보도자료 초안",hr,
        R?.pressReleaseDraft||"",
      ];
      const blob=new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8;"});
      const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
      a.download=`PRIZM_${(title||"film").replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.txt`;
      a.click();
    }

    /* ═══════════════════════════════════════════════════
       SMALL UI COMPONENTS
    ═══════════════════════════════════════════════════ */
    const Badge = ({c,bg,border,children,style={}}) => (
      <span style={{display:"inline-block",background:bg||"var(--bg-secondary)",color:c||"var(--text-secondary)",
        border:`1px solid ${border||(c?c+"30":"var(--border-tertiary)")}`,
        borderRadius:20,padding:"3px 11px",fontSize:12,fontWeight:500,whiteSpace:"nowrap",...style}}>
        {children}
      </span>
    );

    const Row = ({label,value}) => {
      if (!value||["N/A","해당없음","미정",""].includes(String(value).trim())) return null;
      return (
        <div style={{display:"flex",gap:14,marginBottom:10,alignItems:"flex-start"}}>
          <span style={{color:"var(--text-tertiary)",fontSize:12,minWidth:96,flexShrink:0,paddingTop:2}}>{label}</span>
          <span style={{color:"var(--text-primary)",fontSize:14,lineHeight:1.65,flex:1}}>{value}</span>
        </div>
      );
    };

    const Card = ({children,style={}}) => (
      <div style={{background:"var(--bg-primary)",border:"0.5px solid var(--border-tertiary)",
        borderRadius:"var(--radius-lg)",padding:"20px 22px",marginBottom:14,...style}}>
        {children}
      </div>
    );

    const SH = ({children,accent,style={}}) => (
      <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:16,fontWeight:700,
        color:accent||"var(--text-primary)",margin:"0 0 15px",letterSpacing:"-0.01em",...style}}>
        {children}

    /* ═══════════════════════════════════════════════════
       MAIN APP
    ═══════════════════════════════════════════════════ */
    function App() {
      const [apiKey, setApiKey]     = useState(() => localStorage.getItem("prizm:apikey")||"");
      const [view,   setView]       = useState("form");
      const [form,   setForm]       = useState({titleEn:"",titleKo:"",director:"",cast:"",genre:"",country:"",year:"",status:"",source:"",synopsis:""});
      const [result, setResult]     = useState(null);
      const [error,  setError]      = useState("");
      const [tab,    setTab]        = useState("overview");
      const [loadStep,setLoadStep]  = useState(0);
      const [history,setHistory]    = useState([]);
      const [batch,  setBatch]      = useState([]);
      const [copied, setCopied]     = useState("");
      const [showSettings,setShowSettings] = useState(false);
      const [lineup, setLineup]     = useState(null); // parsed distributor lineup
      const [lineupName, setLineupName] = useState("");
      const timerRef = useRef(null);

      useEffect(() => {
        try { const d=localStorage.getItem("prizm:history"); if(d) setHistory(JSON.parse(d)); } catch{}
      }, []);

      const saveApiKey = key => { localStorage.setItem("prizm:apikey",key); setApiKey(key); };
      const clearApiKey = () => { localStorage.removeItem("prizm:apikey"); setApiKey(""); setShowSettings(false); };

      const saveHistory = (r, fd) => {
        const entry = { id:Date.now(), date:new Date().toISOString(),
          title:r.filmOverview?.title||fd.titleEn, koreanTitle:r.filmOverview?.koreanTitle||fd.titleKo,
          status:r.filmOverview?.status||fd.status, score:r.overallAssessment?.acquisitionScore,
          recommendation:r.overallAssessment?.recommendation, result:r, form:fd };
        const nh = [entry,...history].slice(0,60);
        setHistory(nh);
        try { localStorage.setItem("prizm:history",JSON.stringify(nh)); } catch{}
      };

      const parseLineup = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            if (file.name.endsWith(".csv")) {
              const text = e.target.result;
              const rows = text.split("\n").filter(r=>r.trim()).map(r=>r.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));
              const headers = rows[0];
              const data = rows.slice(1).map(r=>Object.fromEntries(headers.map((h,i)=>[h,r[i]||""])));
              setLineup(data); setLineupName(file.name);
            } else {
              const wb = XLSX.read(e.target.result, {type:"array"});
              const ws = wb.Sheets[wb.SheetNames[0]];
              const data = XLSX.utils.sheet_to_json(ws,{defval:""});
              setLineup(data); setLineupName(file.name);
            }
          } catch(err) { setError("파일 파싱 실패: "+err.message); }
        };
        if (file.name.endsWith(".csv")) reader.readAsText(file,"UTF-8");
        else reader.readAsArrayBuffer(file);
      };

      const runAnalysis = async (fd) => {
        if (!fd.titleEn?.trim()||!fd.director?.trim()) { setError("영문 제목과 감독명은 필수 항목입니다."); return; }
        setError(""); setView("loading"); setResult(null); setLoadStep(0);
        let step=0;
        timerRef.current = setInterval(()=>{ step=Math.min(step+1,LOAD_MSGS.length-1); setLoadStep(step); },2800);
        try {
          const info=[
            `영문 제목: ${fd.titleEn}`,
            fd.titleKo&&`한국어 제목: ${fd.titleKo}`,
            `감독: ${fd.director}`,
            fd.cast&&`주연배우: ${fd.cast}`,
            fd.genre&&`장르: ${fd.genre}`,
            fd.country&&`제작국가: ${fd.country}`,
            fd.year&&`제작연도: ${fd.year}`,
            fd.status&&`제작 상태: ${fd.status}`,
            fd.source&&`원작: ${fd.source}`,
            fd.synopsis&&`시놉시스 힌트: ${fd.synopsis}`,
            lineup&&`\n【배급사 라인업 데이터 (${lineupName})】\n다음은 사용자가 업로드한 배급사 상영 예정 라인업입니다. 배급 시기 추천 시 이 데이터를 최우선으로 참고하여 경쟁 회피 전략을 수립하세요:\n${JSON.stringify(lineup,null,2).slice(0,3000)}`,
          ].filter(Boolean).join("\n");

          const res = await fetch("https://api.anthropic.com/v1/messages",{
            method:"POST",
            headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
            body:JSON.stringify({
              model:"claude-sonnet-4-20250514", max_tokens:5000,
              system:SYSTEM_PROMPT,
              tools:[{type:"web_search_20250305",name:"web_search"}],
              messages:[{role:"user",content:`${info}\n\nVariety, THR, Reddit, 익스트림무비 등 모든 소스를 웹 검색하여 종합 분석 JSON을 작성해주세요.`}],
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const texts=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text);
          const raw=texts[texts.length-1]||"";
          const m=raw.match(/\{[\s\S]*\}/);
          if (!m) throw new Error("결과 파싱 실패. 다시 시도해 주세요.");
          const parsed=JSON.parse(m[0]);
          saveHistory(parsed,fd);
          setResult(parsed); setTab("overview"); setView("results");
        } catch(err) {
          setError(err.message); setView("form");
        } finally { clearInterval(timerRef.current); }
      };

      const addToQueue = () => {
        if (!form.titleEn?.trim()) return;
        setBatch(q=>[...q,{...form}]);
        setForm({titleEn:"",titleKo:"",director:"",cast:"",genre:"",country:"",year:"",status:"",source:"",synopsis:""});
      };
      const runQueue = async () => { const q=[...batch]; setBatch([]); for(const fd of q) await runAnalysis(fd); };

      const share = () => {
        const R=result;
        const text=`[PRIZM 분석] ${R?.filmOverview?.title} (${R?.filmOverview?.koreanTitle}) — 구매 점수 ${R?.overallAssessment?.acquisitionScore}/10 · ${R?.overallAssessment?.recommendation}`;
        if(navigator.share) { navigator.share({title:"PRIZM 영화 분석",text}); }
        else { navigator.clipboard.writeText(text); setCopied("share"); setTimeout(()=>setCopied(""),2200); }
      };

      if (!apiKey) return <ApiKeyScreen onSave={saveApiKey}/>;

      const R=result, ov=R?.filmOverview, sc=R?.overallAssessment?.acquisitionScore;
      const stCfg=STATUS_CFG[ov?.status]||STATUS_CFG[form.status];
      const recC=recColor(R?.overallAssessment?.recommendation);

      const inp = { width:"100%",background:"var(--bg-primary)",border:"1px solid var(--border-secondary)",
        borderRadius:"var(--radius-md)",color:"var(--text-primary)",padding:"10px 14px",fontSize:14 };

      const F=(name,label,ph,req)=>(
        <div key={name}>
          <label style={{fontSize:11,color:"var(--text-secondary)",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>
            {label}{req&&<span style={{color:"#c9292b"}}> *</span>}
          </label>
          <input name={name} value={form[name]||""} placeholder={ph} style={inp}
            onChange={e=>setForm(p=>({...p,[e.target.name]:e.target.value}))}/>
        </div>
      );

      return (
        <div style={{minHeight:"100vh",background:"var(--bg-tertiary)"}}>
          {/* ── SETTINGS MODAL ── */}
          {showSettings&&(
            <div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"var(--bg-primary)",borderRadius:16,padding:"32px 28px",maxWidth:400,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
                <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:700,marginBottom:8}}>설정</h2>
                <p style={{fontSize:13,color:"var(--text-secondary)",lineHeight:1.6,marginBottom:24}}>
                  현재 API 키: <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:"var(--text-tertiary)"}}>
                    {apiKey.slice(0,12)}…{apiKey.slice(-4)}</span>
                </p>
                <button onClick={clearApiKey} style={{width:"100%",background:"var(--bg-danger)",border:"1px solid var(--border-danger)",borderRadius:10,color:"var(--text-danger)",padding:"12px",fontSize:14,cursor:"pointer"}}>
                  API 키 삭제 및 로그아웃
                </button>
                <button onClick={()=>setShowSettings(false)} style={{width:"100%",background:"transparent",border:"1px solid var(--border-secondary)",borderRadius:10,color:"var(--text-secondary)",padding:"12px",fontSize:14,cursor:"pointer",marginTop:8}}>
                  닫기
                </button>
              </div>
            </div>
          )}

          {/* ── HEADER ── */}
          <header className="no-print" style={{background:"#1a1928",padding:"0 22px",display:"flex",alignItems:"center",height:54,gap:0,borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <div style={{display:"flex",gap:4,marginRight:14}}>
              {[...Array(5)].map((_,i)=>(
                <div key={i} style={{width:7,height:5,background:"rgba(255,255,255,0.15)",borderRadius:1}}/>
              ))}
            </div>
            <div style={{cursor:"pointer"}} onClick={()=>setView("form")}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:"#c9292b",lineHeight:1,letterSpacing:"0.02em"}}>PRIZM</div>
              <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",letterSpacing:"0.15em",textTransform:"uppercase",marginTop:2}}>Film Acquisition Intelligence</div>
            </div>
            <div style={{flex:1}}/>
            {/* Export buttons (results only) */}
            {view==="results"&&(
              <div className="no-print" style={{display:"flex",gap:6,marginRight:14}}>
                {[
                  {label:copied==="share"?"✓ 복사":"공유",action:share,key:"share"},
                  {label:"CSV",action:()=>downloadCSV(R,ov?.title),key:"csv"},
                  {label:"텍스트",action:()=>downloadTXT(R,ov?.title),key:"txt"},
                  {label:"인쇄/PDF",action:()=>window.print(),key:"pdf"},
                ].map(btn=>(
                  <button key={btn.key} onClick={btn.action} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.15)",
                    borderRadius:8,color:copied==="share"&&btn.key==="share"?"#4ade80":"rgba(255,255,255,0.65)",
                    padding:"5px 13px",fontSize:12,cursor:"pointer"}}>
                    {btn.label}
                  </button>
                ))}
              </div>
            )}
            <nav style={{display:"flex",gap:3}}>
              {[{id:"form",label:"분석"},{id:"history",label:`히스토리${history.length?" "+history.length:""}`}].map(n=>(
                <button key={n.id} onClick={()=>setView(n.id)} style={{background:view===n.id?"rgba(255,255,255,0.1)":"transparent",
                  color:view===n.id?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.45)",
                  border:"none",borderRadius:8,padding:"6px 13px",fontSize:13,cursor:"pointer",fontWeight:view===n.id?500:400}}>
                  {n.label}
                </button>
              ))}
              <button onClick={()=>setShowSettings(true)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.35)",
                borderRadius:8,padding:"6px 10px",fontSize:16,cursor:"pointer"}} title="설정">⚙</button>
            </nav>
          </header>

          <main style={{maxWidth:900,margin:"0 auto",padding:"28px 20px"}}>

            {/* ══ FORM VIEW ══ */}
            {view==="form"&&(
              <div className="fade-up">
                <div style={{marginBottom:24}}>
                  <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:700,margin:"0 0 8px",letterSpacing:"-0.02em",lineHeight:1.2}}>
                    영화 구매 분석
                  </h1>
                  <p style={{color:"var(--text-secondary)",fontSize:14,margin:0,lineHeight:1.65}}>
                    영화 정보를 입력하면 Variety · THR · IMDb · Reddit · 익스트림무비 등을 자동 검색하여 한국 배급 가능성 분석 리포트를 생성합니다.
                  </p>
                </div>

                {error&&(
                  <div style={{background:"var(--bg-danger)",border:"1px solid var(--border-danger)",borderRadius:"var(--radius-md)",padding:"10px 14px",marginBottom:16,color:"var(--text-danger)",fontSize:13}}>
                    ⚠ {error}
                  </div>
                )}

                <Card>

                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      {Object.entries(STATUS_CFG).map(([val,cfg])=>(
                        <button key={val} onClick={()=>setForm(p=>({...p,status:p.status===val?"":val}))}
                          style={{background:form.status===val?cfg.bg:"transparent",color:form.status===val?cfg.c:"var(--text-secondary)",
                            border:`1px solid ${form.status===val?cfg.border:"var(--border-tertiary)"}`,
                            borderRadius:20,padding:"6px 16px",fontSize:13,cursor:"pointer",fontWeight:form.status===val?500:400,transition:"all .15s"}}>
                          {cfg.label}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"18px 24px",marginBottom:18}}>
                    {F("titleEn","영문 제목","e.g. The Substance",true)}
                    {F("titleKo","한국어 제목","e.g. 더 서브스턴스")}
                    {F("director","감독","e.g. Coralie Fargeat",true)}
                    {F("cast","주연배우","e.g. Demi Moore, Margaret Qualley")}
                    {F("genre","장르","e.g. SF 스릴러 / 바디호러")}
                    {F("country","제작국가","e.g. 프랑스 · 영국")}
                    {F("year","제작연도","e.g. 2025")}
                    {F("source","원작 정보","e.g. 동명 소설 원작 (저자명)")}
                  </div>
                  <div style={{marginBottom:22}}>
                    <label style={{fontSize:11,color:"var(--text-secondary)",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>
                      시놉시스 <span style={{color:"var(--text-tertiary)",textTransform:"none",fontWeight:400,letterSpacing:0}}>(선택)</span>
                    </label>
                    <textarea name="synopsis" value={form.synopsis||""} placeholder="줄거리 또는 시놉시스를 입력하세요."
                      onChange={e=>setForm(p=>({...p,synopsis:e.target.value}))}
                      style={{...inp,height:80,resize:"vertical"}}/>
                  </div>

                  <div style={{marginBottom:22}}>
                    <label style={{fontSize:11,color:"var(--text-secondary)",letterSpacing:"0.07em",textTransform:"uppercase",display:"block",marginBottom:6}}>
                      배급사 라인업 파일 <span style={{color:"var(--text-tertiary)",textTransform:"none",fontWeight:400,letterSpacing:0}}>(선택 — 엑셀/CSV, 개봉일정 반영)</span>
                    </label>
                    {lineup?(
                      <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:"rgba(5,150,105,0.06)",border:"1px solid rgba(5,150,105,0.2)",borderRadius:"var(--radius-md)"}}>
                        <span style={{fontSize:20}}>📋</span>
                        <div style={{flex:1}}>

                        </div>
                        <button onClick={()=>{setLineup(null);setLineupName("");}} style={{background:"none",border:"none",color:"var(--text-tertiary)",cursor:"pointer",fontSize:18,padding:"0 4px",lineHeight:1}}>×</button>
                      </div>
                    ):(
                      <label style={{display:"block",cursor:"pointer"}}>

                      <SH>보도자료 초안</SH>
                      <button onClick={()=>{navigator.clipboard.writeText(R.pressReleaseDraft||"");setCopied("press");setTimeout(()=>setCopied(""),2200);}}
                        style={{background:copied==="press"?"var(--bg-success)":"var(--bg-secondary)",
                          border:`0.5px solid ${copied==="press"?"var(--border-success)":"var(--border-secondary)"}`,
                          borderRadius:8,color:copied==="press"?"var(--text-success)":"var(--text-secondary)",
                          padding:"7px 18px",fontSize:13,cursor:"pointer",transition:"all .2s"}}>
                        {copied==="press"?"✓ 복사됨":"복사"}
                      </button>
                    </div>
                    <div style={{background:"var(--bg-secondary)",borderRadius:10,padding:"22px 24px",lineHeight:1.9,fontSize:14.5,whiteSpace:"pre-wrap"}}>
                      {R.pressReleaseDraft}
                    </div>
                    <p style={{fontSize:12,color:"var(--text-tertiary)",margin:"10px 0 0",textAlign:"right"}}>* AI 생성 초안 — 개봉 확정 후 날짜·배급사명 등 수정하여 사용하세요.</p>
                  </Card>
                )}

                {/* ── 종합 평가 ── */}
                {tab==="verdict"&&(
                  <Card>
                    <div style={{display:"flex",gap:24,alignItems:"flex-start",flexWrap:"wrap",marginBottom:24}}>
                      <div style={{textAlign:"center",minWidth:100}}>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:72,fontWeight:900,color:scoreColor(sc),lineHeight:1}}>{sc||"—"}</div>
                        <div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:4}}>/10점</div>
                      </div>
                      <div style={{flex:1}}>
                        {R.overallAssessment?.recommendation&&(
                          <div style={{display:"inline-block",background:recC+"15",color:recC,border:`1px solid ${recC}40`,borderRadius:9,padding:"8px 20px",fontSize:15,fontWeight:600,marginBottom:14}}>
                            {R.overallAssessment.recommendation}
                          </div>
                        )}
                        <Row label="예상 관객 수" value={R.overallAssessment?.expectedAudienceRange}/>
                      </div>
                    </div>
                    {R.overallAssessment?.keyRisks&&(
                      <div style={{background:"var(--bg-danger)",border:"1px solid var(--border-danger)",borderRadius:9,padding:"14px 18px",marginBottom:18}}>
                        <p style={{fontSize:12,color:"var(--text-danger)",margin:"0 0 5px",fontWeight:600}}>핵심 리스크</p>
                        <p style={{fontSize:14,margin:0,lineHeight:1.65}}>{R.overallAssessment.keyRisks}</p>
                      </div>
                    )}
                    {R.overallAssessment?.finalOpinion&&(
                      <div>
                        <p style={{fontSize:11,color:"var(--text-tertiary)",textTransform:"uppercase",letterSpacing:"0.07em",margin:"0 0 10px"}}>종합 의견</p>
                        <p style={{fontSize:14,lineHeight:1.85,margin:0}}>{R.overallAssessment.finalOpinion}</p>
                      </div>
                    )}
                  </Card>
                )}
              </div>
            )}

            {/* ══ HISTORY VIEW ══ */}
            {view==="history"&&(
              <div className="fade-up">
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:22}}>
                  <div>
                    <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:700,margin:"0 0 5px",letterSpacing:"-0.02em"}}>분석 히스토리</h1>
                    <p style={{fontSize:13,color:"var(--text-secondary)",margin:0}}>{history.length}건의 분석 기록 저장됨</p>
                  </div>
                  {history.length>0&&(
                    <button onClick={()=>{setHistory([]);try{localStorage.removeItem("prizm:history");}catch{}}} style={{background:"var(--bg-danger)",border:"1px solid var(--border-danger)",borderRadius:8,color:"var(--text-danger)",padding:"7px 16px",fontSize:12,cursor:"pointer"}}>전체 삭제</button>
                  )}
                </div>
                {history.length===0?(
                  <Card><p style={{color:"var(--text-tertiary)",textAlign:"center",padding:"32px 0",margin:0,fontSize:14}}>저장된 분석 기록이 없습니다. 영화를 분석하면 자동으로 저장됩니다.</p></Card>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(250px, 1fr))",gap:12}}>
                    {history.map(e=>{
                      const scC2=scoreColor(e.score), stC=STATUS_CFG[e.status], recC2=recColor(e.recommendation);
                      return (
                        <div key={e.id} className="hov-card" onClick={()=>{setResult(e.result);setForm(e.form||{});setTab("overview");setView("results");}}
                          style={{background:"var(--bg-primary)",border:"0.5px solid var(--border-tertiary)",borderRadius:"var(--radius-lg)",padding:"16px 18px",cursor:"pointer",transition:"border-color .15s"}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                            <div style={{flex:1,minWidth:0,marginRight:10}}>
                              <p style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,margin:"0 0 2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.title}</p>
                              {e.koreanTitle&&<p style={{fontSize:12,color:"var(--text-secondary)",margin:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.koreanTitle}</p>}
                            </div>
                            <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:scC2,flexShrink:0}}>{e.score||"—"}</div>
                          </div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:10}}>
                            {stC&&<Badge c={stC.c} bg={stC.bg} border={stC.border}>{stC.label}</Badge>}
                            {e.recommendation&&<Badge c={recC2} bg={recC2+"14"}>{e.recommendation}</Badge>}
                          </div>
                          <p style={{fontSize:11,color:"var(--text-tertiary)",margin:0}}>{new Date(e.date).toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric"})}</p>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
